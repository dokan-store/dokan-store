<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دُكان ستور</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    direction:rtl;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
}

.logo{
    font-size:30px;
    color:#00ff88;
    font-weight:bold;
}

.sub{
    color:#aaa;
}

/* CARDS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#151515;
    border-radius:20px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.price{
    color:#00ff88;
    font-size:20px;
}

button{
    background:#00ff88;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    width:100%;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000cc;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:320px;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

/* PAYMENT INFO */
.pay{
    background:#111;
    padding:15px;
    margin:20px;
    border-radius:15px;
}

footer{
    text-align:center;
    color:#666;
    padding:15px;
}
</style>
</head>

<body>

<header>
<div class="logo">🛒 دُكان ستور</div>
<div class="sub">اشتراكات + خدمات رقمية</div>
</header>

<div class="container">

<div class="card">
<h3>Netflix</h3>
<p class="price">40 دينار</p>
<button onclick="openForm('Netflix')">اشترك</button>
</div>

<div class="card">
<h3>Snapchat+</h3>
<p class="price">20 دينار</p>
<button onclick="openForm('Snapchat+')">اشترك</button>
</div>

<div class="card">
<h3>Shahid VIP</h3>
<p class="price">25 دينار</p>
<button onclick="openForm('Shahid VIP')">اشترك</button>
</div>

<div class="card">
<h3>Watch It</h3>
<p class="price">15 دينار</p>
<button onclick="openForm('Watch It')">اشترك</button>
</div>

</div>

<!-- طرق الدفع -->
<div class="pay">
<h3>💳 طرق الدفع</h3>
<p>📱 تحويل رصيد: 0917311459</p>
<p>🏦 مصرف الجمهورية</p>
<p>📩 بعد التحويل صوّر العملية وابعتها واتساب</p>
</div>

<!-- FORM -->
<div class="modal" id="formBox">
<div class="box">

<h3 id="productName"></h3>

<input type="text" id="name" placeholder="اسمك">
<input type="text" id="phoneUser" placeholder="رقمك">

<select id="payment">
<option>تحويل رصيد</option>
<option>تحويل بنكي</option>
</select>

<button onclick="sendOrder()">تأكيد الطلب</button>

</div>
</div>

<footer>© دُكان ستور</footer>

<script>
let product="";

function openForm(p){
product=p;
document.getElementById("productName").innerText=p;
document.getElementById("formBox").style.display="flex";
}

function sendOrder(){
let name=document.getElementById("name").value;
let phoneUser=document.getElementById("phoneUser").value;
let payment=document.getElementById("payment").value;

let phone="218917311459";

let msg="طلب جديد:%0A"+
"الخدمة: "+product+"%0A"+
"الاسم: "+name+"%0A"+
"رقم الزبون: "+phoneUser+"%0A"+
"طريقة الدفع: "+payment;

window.open("https://wa.me/"+phone+"?text="+msg);
}
</script>

</body>
</html>
