<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokan Store</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1 {
  color:#22c55e;
}

.cart {
  cursor:pointer;
}

.hero {
  padding:40px;
}

.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.product {
  background:#1e293b;
  margin:15px;
  padding:20px;
  border-radius:15px;
  width:260px;
}

.product img {
  width:80px;
}

select, button {
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* السلة */
.cart-box {
  position:fixed;
  right:10px;
  top:70px;
  background:#020617;
  padding:15px;
  border-radius:10px;
  display:none;
  width:250px;
}

.payment {
  background:#020617;
  padding:30px;
  margin-top:30px;
}

footer {
  padding:15px;
  background:#020617;
  margin-top:20px;
}
</style>

</head>

<body>

<header>
  <h1>Dokan Store 🔥</h1>
  <div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<div class="cart-box" id="cartBox">
  <h3>السلة</h3>
  <ul id="cartItems"></ul>
  <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<section class="hero">
  <h2>أفضل متجر اشتراكات رقمية في ليبيا 🇱🇾</h2>
  <p>تسليم فوري ⚡ أسعار قوية 💸 دعم 24/7</p>
</section>

<section class="products">

<!-- Snap -->
<div class="product">
  <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/1024px-Snapchat_logo.svg.png">
  <h3>Snapchat Plus 👻</h3>

  <select id="snap">
    <option value="3 شهور - 55">3 شهور - 55 دينار</option>
    <option value="6 شهور - 95">6 شهور - 95 دينار</option>
    <option value="12 شهر - 195">12 شهر - 195 دينار</option>
  </select>

  <button onclick="addToCart('Snapchat Plus', 'snap')">إضافة للسلة</button>
</div>

<!-- Netflix -->
<div class="product">
  <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
  <h3>Netflix 🎬</h3>

  <select id="netflix">
    <option value="شهر - 25">شهر - 25 دينار</option>
  </select>

  <button onclick="addToCart('Netflix', 'netflix')">إضافة للسلة</button>
</div>

</section>

<section class="payment">
  <h2>💳 طرق الدفع</h2>
  <p>📱 ليبيانا: 0917311459</p>
  <p>🏦 تحويل مصرفي (راسلنا واتساب)</p>
</section>

<footer>
  <p>© 2026 جميع الحقوق محفوظة - Dokan Store</p>
</footer>

<script>
let cart = [];

function addToCart(name, id){
  let value = document.getElementById(id).value;
  cart.push(name + " - " + value);
  updateCart();
}

function updateCart(){
  let list = document.getElementById("cartItems");
  list.innerHTML = "";
  cart.forEach(item=>{
    let li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
  document.getElementById("count").textContent = cart.length;
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function sendOrder(){
  let text = "طلب جديد:%0A";
  cart.forEach(i=> text += "- " + i + "%0A");

  window.open("https://wa.me/218917311459?text=" + text);
}
</script>

</body>
</html>
