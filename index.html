<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokan Store</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f3f4f6;
}

/* Header */
.header{
  background:#b91c1c;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
}

/* Banner */
.banner{
  background:linear-gradient(90deg,#ef4444,#991b1b);
  color:white;
  padding:20px;
  text-align:center;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:120px;
  border-radius:15px;
}

.price{
  font-size:18px;
  margin:10px;
}

button{
  background:#dc2626;
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}

/* Phone Page */
.phone-box{
  display:none;
  padding:20px;
}

.input{
  width:100%;
  padding:15px;
  border-radius:15px;
  border:2px solid #6366f1;
  font-size:18px;
  text-align:center;
}

.verify-btn{
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  margin-top:15px;
}

.desc{
  background:#e5e7eb;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

/* Features */
.features{
  background:#b91c1c;
  color:white;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">Dokan Store 🔥</div>

<div class="banner">
اشترك في أفضل الخدمات 🔥 تسليم فوري ⚡
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

<div class="card">
<img src="https://i.imgur.com/2nCt3Sbl.jpg">
<h3>Netflix 45 يوم</h3>
<p>🔥 جودة 4K + حساب خاص</p>
<div class="price">75 دينار</div>
<button onclick="buy('Netflix 45 يوم')">اشترك الآن</button>
</div>

<div class="card">
<img src="https://i.imgur.com/7yUvePIl.jpg">
<h3>Shahid VIP</h3>
<p>🎬 أفضل المسلسلات العربية</p>
<div class="price">35 دينار</div>
<button onclick="buy('Shahid VIP')">اشترك الآن</button>
</div>

</div>

<!-- PHONE PAGE -->
<div class="phone-box" id="phonePage">

<h2 style="text-align:center">📱 أدخل رقم هاتفك</h2>

<input id="phone" class="input" placeholder="091XXXXXXX">

<button class="verify-btn" onclick="send()">إرسال الطلب</button>

<div class="desc">
✔ رقمك محمي 🔒 <br>
✔ تسليم فوري ⚡ <br>
✔ دعم كامل 💬
</div>

</div>

<!-- Features -->
<div class="features">
<div>✔ مصدر موثوق</div>
<div>⚡ تسليم فوري</div>
<div>💬 دعم ومتابعة</div>
<div>🔒 منتجات مضمونة</div>
</div>

<script>
let selected="";

function buy(product){
selected=product;
document.getElementById("products").style.display="none";
document.getElementById("phonePage").style.display="block";
}

function send(){
let phone=document.getElementById("phone").value;

let msg="طلب جديد:%0A"+selected+"%0Aرقم: "+phone;

window.open("https://wa.me/218917311459?text="+msg);
}
</script>

</body>
</html>
