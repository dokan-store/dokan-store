<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokan Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}

/* Header */
header{
  background:#0f172a;
  padding:15px;
  text-align:center;
  border-bottom:1px solid #1f2937;
}
header h1{color:#22c55e}

/* Offer */
.offer{
  background:#dc2626;
  text-align:center;
  padding:10px;
  animation:pulse 1.5s infinite;
}

/* Hero */
.hero{
  text-align:center;
  padding:40px;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.product{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  border:1px solid #1f2937;
}

.product img{width:80px}

select,input{
  width:100%;
  padding:8px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* Reviews */
.reviews{
  padding:30px;
}
.review{
  background:#0f172a;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

/* Notification */
#notify{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#22c55e;
  padding:10px;
  border-radius:10px;
  display:none;
}

/* Footer */
footer{
  text-align:center;
  padding:15px;
  background:#020617;
}

/* Animations */
@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.5}
  100%{opacity:1}
}
</style>
</head>

<body>

<header>
  <h1>Dokan Store 🔥</h1>
</header>

<div class="offer">
🔥 عرض محدود! ينتهي خلال: <span id="timer">10:00</span>
</div>

<section class="hero">
  <h2>أقوى متجر اشتراكات رقمية 🇱🇾</h2>
  <p>أكثر من 1200 زبون ✔️ تسليم فوري ⚡</p>
</section>

<section class="products">

<!-- Snap -->
<div class="product">
<img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c4/Snapchat_logo.svg/512px-Snapchat_logo.svg.png">
<h3>Snapchat Plus 👻</h3>
<select id="snap">
<option value="3 شهور - 65">3 شهور - 65</option>
<option value="6 شهور - 110">6 شهور - 110</option>
<option value="12 شهر - 220">12 شهر - 220</option>
</select>
<input id="name1" placeholder="اسمك">
<button onclick="order('Snapchat Plus','snap','name1')">اطلب</button>
</div>

<!-- Netflix -->
<div class="product">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix 🎬</h3>
<select id="netflix">
<option value="45 يوم - 75">45 يوم - 75</option>
</select>
<input id="name2" placeholder="اسمك">
<button onclick="order('Netflix','netflix','name2')">اطلب</button>
</div>

</section>

<section class="reviews">
<h2>⭐ آراء الزبائن</h2>
<div class="review">محمد: وصلني بسرعة 🔥</div>
<div class="review">سالم: خدمة ممتازة 💯</div>
<div class="review">علي: ثقة 👍</div>
</section>

<div id="notify"></div>

<footer>
© 2026 جميع الحقوق محفوظة - Dokan Store
</footer>

<script>
function order(name,id,input){
let value=document.getElementById(id).value;
let user=document.getElementById(input).value;
let msg="طلب جديد:%0A"+name+" - "+value+"%0Aالاسم: "+user;
window.open("https://wa.me/218917311459?text="+msg);
}

/* Timer */
let time=600;
setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerHTML=m+":"+s;
time--;
if(time<0)time=600;
},1000);

/* Notifications */
let names=["محمد","سالم","علي","يوسف"];
let prods=["Snap","Netflix"];

setInterval(()=>{
let n=names[Math.floor(Math.random()*names.length)];
let p=prods[Math.floor(Math.random()*prods.length)];

let box=document.getElementById("notify");
box.innerHTML="🔥 "+n+" اشترى "+p;
box.style.display="block";

setTimeout(()=>box.style.display="none",3000);
},5000);
</script>

</body>
</html>
